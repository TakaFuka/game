<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Game</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="topBar">
        <div id="screenTime">00:00</div>

        <div>
            <button id="settingButton">⚙</button>
            <button id="pauseButton">⏸</button>
        </div>
    </div>

    <div id="counter">
        30
    </div>

    <div id="taskText">
        課題文が表示されます
    </div>

    <div id="buttonArea"></div>
    
    <div id="debugPanel"></div>

    <div id="pauseOverlay">

        <div id="pauseContent">

            <h1>PAUSE</h1>

            <button id="resumeButton">
                再開
            </button>

        </div>

    </div>
    <script src="js/game.js"></script>

</body>
</html>
